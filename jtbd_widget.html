<div id="wf-painpoints"></div>
<script>
const WF_PAINPOINTS = [
  "We can't query across our CRM, our investor list, and WhatsApp — warm intros are slipping through the cracks",
  "Our 'warm leads' list is polluted by auto-replies. Can we tell real interest from out-of-office?",
  "Drivers are taking photos of delivery dockets on WhatsApp and we lose half of them. Can a form pick that up automatically?",
  "Bank feed comes in cryptic — finance spends hours guessing what 'STR-PYMT 8842' actually was",
  "We brief partners over Slack and email, but no one logs the deal until it's already moved on",
  "Every IC deck takes a day to assemble from MIS, calls, and old presentations. Can a first draft generate itself?",
  "Our sequencing tool sends the same five emails to a fintech founder and a logistics COO. Can outreach actually be personalised?",
  "Meeting action items get spoken, nodded at, then forgotten. Can the right tasks land in the right tracker automatically?",
  "We've scraped 50,000 contacts but no one knows which are real prospects. Can enrichment do the triage for us?",
  "Stock levels in our warehouse system don't match what customers see on the storefront. Reconciling it is a daily fire drill",
  "Our compliance evidence is scattered across Drive, Notion, and screenshots. Can we make audits boring again?",
  "We use Streak, Affinity, and Carta — and none of them talk to each other. Quarterly reports are a manual archaeology project",
  "I'm building a CRM in Notion but enrichment vendors want $3K/year for what should cost cents per record",
  "When a deal closes, six things should happen — folder, channel, invoice, onboarding email. Right now, three of them slip",
  "Our analysts manually transcribe TikToks and YouTube channels to spot narratives. Can a pipeline do the boring half?"
];

(function mount(){
const host = document.getElementById('wf-painpoints');
if (!host) return requestAnimationFrame(mount);

// 1) Push styles to <head> so callout sanitisation/overflow doesn't nuke them
const css = `
  @import url('<https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap>');

  /* Remove any spacing from Bullet's wrapper */
  .notion-custom-code {
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Ensure host container has no spacing */
  #wf-painpoints {
    margin: 0 !important;
    padding: 0 !important;
    line-height: 1 !important;
    font-size: 0 !important; /* Eliminate any text node spacing */
  }

  /* Reset font-size for the actual widget */
  .wf-pp {
    font-family: 'Inter', sans-serif;
    font-size: initial; /* Reset font-size */
    background: transparent;
    border-radius: 16px;
    padding: 8px;
    max-width: 640px;
    margin: 0 auto !important; /* Ensure no top margin */
    overflow: hidden;
    isolation: isolate;
    vertical-align: top; /* Align to top */
  }

  .wf-pp, .wf-pp * {
    mix-blend-mode: normal;
  }

  .wf-pp__viewport {
    height: 250px;
    overflow: hidden;
    position: relative;
  }

  .wf-pp__list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    will-change: transform;
  }

  .wf-pp__list--anim {
    animation: wf-pp-scroll 24s linear infinite;
  }

  .wf-pp__item {
    background: #fff;
    color: #111 !important;
    padding: 8px 16px;
    border-radius: 16px;
    font-size: 18px;
    line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    max-width: 90%;
    align-self: flex-start;
  }

  @keyframes wf-pp-scroll {
    0% { transform: translateY(0) }
    100% { transform: translateY(-50%) }
  }

  @media (prefers-reduced-motion: reduce) {
    .wf-pp__list--anim { animation: none }
  }
`;

const style = document.createElement('style');
style.textContent = css;
document.head.appendChild(style);

// 2) Inject the markup with no whitespace
host.innerHTML = `<div class="wf-pp"><div class="wf-pp__viewport"><div class="wf-pp__list wf-pp__list--anim">${WF_PAINPOINTS.map(t => `<div class="wf-pp__item">${t}</div>`).join('')}${WF_PAINPOINTS.map(t => `<div class="wf-pp__item" aria-hidden="true">${t}</div>`).join('')}</div></div></div>`;
})();
</script>
